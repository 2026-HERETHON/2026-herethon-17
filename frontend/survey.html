<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb - survey</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/survey.css">
  </head>
<body>
  
  <div class="app-container">
    
    <main class="app-content">

      <div class="survey-header">
        <h1 class="survey-title">자가진단 설문</h1>
        <span class="survey-pagenum" id="survey-pagenum">1/ 5</span>
      </div>

      <div class="survey-progress">
        <div class="survey-progressbar" id="survey-progressbar"></div>
      </div>
      
      <div class="survey-container">
        <span class="survey-questionnum" id="survey-questionnum">Q1</span>

        <h2 class="survey-questitle" id="survey-questitle">요즘 나의 상태를 가장 잘 표현하는 문장은 ?</h2>

        <div class="survey-options" id="survey-options">
          <label class="survey-optionitem">
            <input type="radio" name="survey-answer" value="1">
            <span class="survey-newradio">
              <img src="../frontend/assets/icons/Checkedicon.png" alt="" class="survey-checked">
            </span>
            <span class="survey-option">예전의 나와 지금의 내가 달라진 것 같아 혼란스럽다</span>
          </label>

          <label class="survey-optionitem">
            <input type="radio" name="survey-answer" value="2">
            <span class="survey-newradio">
              <img src="../frontend/assets/icons/Checkedicon.png" alt="" class="survey-checked">
            </span>
            <span class="survey-option">예전과는 다르지만, 이제 조금씩 익숙해지고 있다</span>
          </label>

          <label class="survey-optionitem">
            <input type="radio" name="survey-answer" value="3">
            <span class="survey-newradio">
              <img src="../frontend/assets/icons/Checkedicon.png" alt="" class="survey-checked">
            </span>
            <span class="survey-option">지금의 나를 자연스럽게 받아들이고 있다</span>
          </label>
        </div>

        <div class="survey-nav">
          <button type="button" class="prev-btn" id="prev-btn" >이전</button>
          <button type="button" class="next-btn" id="next-btn" disabled >다음</button>
        </div>








      </div>


      </main>

  </div>

  <script src="js/common.js"></script>
</body>
</html>
