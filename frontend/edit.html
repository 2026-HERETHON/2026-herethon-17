<!-- 기록 수정 모드 페이지-->
 <!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb - 기록 수정</title>
  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/tracker.css">
</head>
<body>
  <main class="app-container">
    
    <header class="app-header">
      <button class="icon-btn back-btn" onclick="window.history.back()">
        <img src="assets/icons/back.svg" alt="뒤로가기">
      </button>
      <div class="header-text-group">
        <!-- JS가 하던 역할을 HTML에 직접 적용 -->
        <h1 class="header-title">기록 수정</h1>
        <p class="header-date">오늘 기록을 수정합니다</p>
      </div>
      <!-- 수정 모드 뱃지 고정 표시 -->
      <span class="mode-badge" id="mode-badge" style="display: flex;">수정 모드</span>
    </header>

    <section id="step-4" class="step-section active">
      
      <form action="complete.html" method="POST" id="edit-form">
        <!-- 5개의 증상 카드가 모두 렌더링 될 영역 (백엔드 처리 권장) -->
        <div class="strength-list" id="edit-strength-list">
          <!-- JS 동적 렌더링 영역 (추후 백엔드에서 데이터와 함께 뿌려줌) -->
        </div>

        <div class="button-group">
          <a href="index.html" class="btn btn-secondary">홈으로</a>
          <button type="submit" id="btn-edit-complete" class="btn btn-primary">수정 완료</button>
        </div>
      </form>

    </section>

    <!-- 토스트 메시지 컨테이너 -->
    <div id="toast-container" class="toast-container">
      <div id="toast-success" class="toast-message toast-success">
        <img src="assets/icons/check_circle.svg" alt="성공" class="toast-icon">
        <span class="toast-text">수정이 정상적으로 완료되었어요.</span>
      </div>
      <div id="toast-error" class="toast-message toast-error">
        <img src="assets/icons/check_circle_error.svg" alt="실패" class="toast-icon">
        <span class="toast-text">기록을 수정하지 못했습니다.<br>다시 한번 시도해 주세요.</span>
      </div>
    </div>

  </main>

  <script src="js/edit.js"></script>
  <script src="js/toast.js"></script>
</body>
</html>
