<!-- 5.1. 화분 목록 페이지-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/tracker.css"/>
  <link rel="stylesheet" href="css/garden.css"/>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <button class="icon-btn back-btn">
        <img src="assets/icons/back.svg" alt="뒤로가기"/>
      </button>
      <h1 class="header-title">나의 정원</h1>
      <!-- 화분 추가 버튼-->
      <a href="garden_write.html" class="plus-btn">
        <img src="assets/icons/plus.svg" alt="화분 추가"/>
      </a>
    </header>

    <main class="app-content">
      <!-- 화분이 없을 때 띄워줄 빈 화면 (기본적으로 숨겨둠) -->
      <div class="empty-garden" id="empty-garden-state" style="display: none;">
        <img src="assets/icons/pottedplant.svg" alt="빈 화분" class="empty-garden-icon">
        <div class="empty-garden-text-wrapper">
          <h2 class="empty-garden-title">아직 추가된 화분이 없어요.</h2>
          <p class="empty-garden-desc">화분을 추가하여 나의 정원을 꾸며보세요</p>
        </div>
      </div>
      <!--반복되는 아이템 부분-->
      <div class="timeline-container">

        <a href="garden_detail.html" class="timeline-item">
          <div class="timeline-left">
            <div class="timeline-icon">🧘</div>
            <div class="timeline-line"></div>
          </div>
        
          <div class="timeline-card">
            <div class="card-header">
              <span class="card-date">6월 23일</span>
              <span class="card-badge">오늘</span>
            </div>
            <h3 class="card-title">요가 클래스 첫 등록</h3>
            <p class="card-content">"운동하고 나니 몸이 개운해졌다."</p>
          </div>
        </a>
      
        <a href="#" class="timeline-item">
          <div class="timeline-left">
            <div class="timeline-icon">🌅</div>
            <div class="timeline-line"></div>
          </div>
          <div class="timeline-card">
            <div class="card-header">
              <span class="card-date">6월 10일</span>
              <span class="card-badge">13일 전</span>
            </div>
            <h3 class="card-title">아침 산책 30일 도전 시작</h3>
            <p class="card-content">"작게 시작했는데 벌써 2주째!"</p>
          </div>
        </a>

        <a href="#" class="timeline-item">
          <div class="timeline-left">
            <div class="timeline-icon">📚</div>
            <div class="timeline-line"></div>
          </div>
        
          <div class="timeline-card">
            <div class="card-header">
              <span class="card-date">5월 28일</span>
              <span class="card-badge">26일전</span>
            </div>
            <h3 class="card-title">독서 모임 참가</h3>
            <p class="card-content">"오랜만에 새로운 사람들과 이야기하니 즐거웠다......."</p>
          </div>
        </a>
      
      </div>
    </main>

    <!-- 하단 GNB바 -->
    <nav class="app-bottom-tab">
    
      <!-- 홈 -->
      <a href="index.html" class="tab-item">
      <img src="assets/icons/tab_home_inactive.svg" alt="홈" class="tab-icon"/>
      <span class="tab-text">홈</span>
      </a>
    
      <!-- 패턴 리포트 -->
      <a href="report.html" class="tab-item">
      <img src="assets/icons/tab_report_inactive.svg" alt="리포트" class="tab-icon"/>
      <span class="tab-text">리포트</span>
      </a>
    
      <!-- 나의 정원 (현재 페이지 - Active 아이콘) -->
      <a href="garden_list.html" class="tab-item active">
      <img src="assets/icons/tab_garden_active.svg" alt="나의 정원" class="tab-icon"/>
      <span class="tab-text">나의 정원</span>
      </a>
    
      <!-- 허브 커뮤니티 -->
      <a href="community_list.html" class="tab-item">
      <img src="assets/icons/tab_community_inactive.svg" alt="커뮤니티" class="tab-icon"/>
      <span class="tab-text">커뮤니티</span>
      </a>
    </nav>

  </div>

  <!-- 토스트 메시지 컨테이너 -->
  <div id="toast-container" class="toast-container">
    <!-- 성공 토스트 메시지 (초록색) -->
    <div id="toast-success" class="toast-message toast-success">
      <img src="assets/icons/check_circle.svg" alt="성공" class="toast-icon">
      <span class="toast-text">삭제가 정상적으로 완료되었어요.</span>
    </div>
    <!-- 실패/에러 토스트 메시지 (빨간색) -->
    <div id="toast-error" class="toast-message toast-error">
      <img src="assets/icons/check_circle_error.svg" alt="실패" class="toast-icon">
      <span class="toast-text">게시글을 삭제하지 못했습니다.<br>다시 한번 시도해 주세요.</span>
    </div>
  </div>
  

  <script src="js/common.js"></script>
  <script src="js/garden.js"></script>
</body>
</html>
