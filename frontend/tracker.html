<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/tracker.css">
  </head>
<body>
  
  <!-- 전체를 감싸는 컨테이너 -->
  <main class="app-container">
    
    <!-- 공통 헤더 -->
    <header class="app-header">
      <button class="icon-btn back-btn">
        <img src="assets/icons/back.svg" alt="뒤로가기">
      </button>
      <div class="header-text-group">
        <h1 class="header-title">오늘 기록하기</h1>
        <p class="header-date">2026년 7월 13일</p>
      </div>
      <span class="mode-badge" id="mode-badge" style="display: none;">수정 모드</span>
    </header>

    <!-- ==========================================
         3.1 증상 선택 화면
    ========================================== -->
    <section id="step-1" class="step-section active">
      <div class="progress-wrapper">
        <!-- 전체 배경이 되는 회색 바 -->
        <div class="progress-gray">
          <!-- 실제 진행 상태를 나타내는 초록색 바 -->
          <div class="progress-green"></div>
        </div>
      </div>
      
      <div class="step-title-area">
        <h2>오늘 경험한 증상을 선택해 주세요</h2>
        <p>복수 선택 가능</p>
      </div>

        <!-- 증상 선택 카드 리스트 전체 -->
      <div class="symptom-list">

        <!-- 1. 안면홍조 -->
        <div class="symptom-card" data-id="1">
          <img src="assets/icons/symptom_hot_inactive.svg" alt="안면홍조" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">안면홍조</span>
          </div>
          <input type="checkbox" name="symptom_ids" value="1" hidden>
          <button class="check-box" aria-label="안면홍조 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 2. 수면장애 -->
        <div class="symptom-card" data-id="2">
          <img src="assets/icons/symptom_sleep_inactive.svg" alt="수면장애" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">수면장애</span>
          </div>
          <input type="checkbox" name="symptom_ids" value="2" hidden>
          <button class="check-box" aria-label="수면장애 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 3. 감정기복 -->
        <div class="symptom-card" data-id="3">
          <img src="assets/icons/symptom_mood_inactive.svg" alt="감정기복" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">감정기복</span>
          </div>
          <input type="checkbox" name="symptom_ids" value="3" hidden>
          <button class="check-box" aria-label="감정기복 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 4. 피로감 -->
        <div class="symptom-card" data-id="4">
          <img src="assets/icons/symptom_fatigue_inactive.svg" alt="피로감" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">피로감</span>
          </div>
          <input type="checkbox" name="symptom_ids" value="4" hidden>
          <button class="check-box" aria-label="피로감 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 5. 관절통 -->
        <div class="symptom-card" data-id="5">
          <img src="assets/icons/symptom_joint_inactive.svg" alt="관절통" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">관절통</span>
          </div>
          <input type="checkbox" name="symptom_ids" value="5" hidden>
          <button class="check-box" aria-label="관절통 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 6. 증상 없음 -->
        <div class="symptom-card" data-id="0">
          <img src="assets/icons/symptom_none_inactive.svg" alt="증상 없음" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">증상 없음</span>
        </div>
        <input type="checkbox" name="no_symptom" value="true" hidden>
        <button class="check-box" aria-label="증상 없음 선택">
          <img src="assets/icons/check.svg" alt="체크" class="check-icon">
        </button>
      </div>

      </div>

      <div class="bottom-fixed-area">
        <button type="button" id="btn-next-step1" class="btn btn-next" disabled>다음 (0개 선택됨)</button>
      </div>
    </section>


    </main>


  <script src="js/tracker.js"></script>
  <script src="js/toast.js"></script>
</body>
</html>
