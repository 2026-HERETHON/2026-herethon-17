<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/tracker.css">
  </head>
<body>
  
  <div class="app-container">
    
    <main class="app-content">
      <!-- 증상 선택 카드 리스트 전체 -->
      <div class="symptom-list">

        <!-- 1. 안면홍조 -->
        <div class="symptom-card">
          <img src="assets/icons/symptom_hot_inactive.svg" alt="안면홍조" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">안면홍조</span>
          </div>
          <button class="check-box" aria-label="안면홍조 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 2. 수면장애 -->
        <div class="symptom-card">
          <img src="assets/icons/symptom_sleep_inactive.svg" alt="수면장애" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">수면장애</span>
          </div>
          <button class="check-box" aria-label="수면장애 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 3. 감정기복 -->
        <div class="symptom-card">
          <img src="assets/icons/symptom_mood_inactive.svg" alt="감정기복" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">감정기복</span>
          </div>
          <button class="check-box" aria-label="감정기복 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 4. 피로감 -->
        <div class="symptom-card">
          <img src="assets/icons/symptom_fatigue_inactive.svg" alt="피로감" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">피로감</span>
          </div>
          <button class="check-box" aria-label="피로감 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 5. 관절통 -->
        <div class="symptom-card">
          <img src="assets/icons/symptom_joint_inactive.svg" alt="관절통" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">관절통</span>
          </div>
          <button class="check-box" aria-label="관절통 선택">
            <img src="assets/icons/check.svg" alt="체크" class="check-icon">
          </button>
        </div>

        <!-- 6. 증상 없음 -->
        <div class="symptom-card">
          <img src="assets/icons/symptom_none_inactive.svg" alt="증상 없음" class="symptom-icon">
          <div class="symptom-text-box">
            <span class="symptom-name">증상 없음</span>
        </div>
        <button class="check-box" aria-label="증상 없음 선택">
          <img src="assets/icons/check.svg" alt="체크" class="check-icon">
        </button>
      </div>


      <!-- 증상 강도 카드 리스트 전체 -->
      <div class="strength-list">

        <!-- 안면홍조 -->
        <div class="strength-card">
          <div class="strength-header">
            <img src="assets/icons/symptom_hot_inactive.svg" alt="안면홍조" class="symptom-icon">
            <span class="symptom-name">안면홍조</span>
          </div>
          <div class="strength-buttons">
            <button class="btn-strength low">약</button>
            <button class="btn-strength mid">중</button>
            <button class="btn-strength high">강</button>
          </div>
        </div>

      <!-- 수면장애 -->
      <div class="strength-card">
        <div class="strength-header">
          <img src="assets/icons/symptom_sleep_inactive.svg" alt="수면장애" class="symptom-icon">
          <span class="symptom-name">수면장애</span>
        </div>
        <div class="strength-buttons">
          <button class="btn-strength low">약</button>
          <button class="btn-strength mid">중</button>
          <button class="btn-strength high">강</button>
        </div>
      </div>
      <!-- 감정기복 -->
        <div class="strength-card">
          <div class="strength-header">
            <img src="assets/icons/symptom_mood_inactive.svg" alt="감정기복" class="symptom-icon">
            <span class="symptom-name">감정기복</span>
          </div>
          <div class="strength-buttons">
            <button class="btn-strength low">약</button>
            <button class="btn-strength mid">중</button>
            <button class="btn-strength high">강</button>
          </div>
        </div>

        <!-- 피로감 -->
        <div class="strength-card">
          <div class="strength-header">
            <img src="assets/icons/symptom_fatigue_inactive.svg" alt="피로감" class="symptom-icon">
            <span class="symptom-name">피로감</span>
          </div>
          <div class="strength-buttons">
            <button class="btn-strength low">약</button>
            <button class="btn-strength mid">중</button>
            <button class="btn-strength high">강</button>
          </div>
        </div>

        <!-- 관절통 -->
        <div class="strength-card">
          <div class="strength-header">
            <img src="assets/icons/symptom_joint_inactive.svg" alt="관절통" class="symptom-icon">
            <span class="symptom-name">관절통</span>
          </div>
          <div class="strength-buttons">
            <button class="btn-strength low">약</button>
            <button class="btn-strength mid">중</button>
            <button class="btn-strength high">강</button>
          </div>
        </div>
      </div>

      <!-- 저장 기록 카드 리스트 -->
      <div class="record-list">

        <!-- 안면홍조 (강, 추후수정) -->
        <div class="record-card">
          <!-- 증상 정보 -->
          <div class="record-info">
            <img src="assets/icons/symptom_hot_inactive.svg" alt="안면홍조" class="symptom-icon">
            <span class="symptom-name">안면홍조</span>
          </div>
          <!-- 강도 뱃지 -->
          <div class="record-badge high">강</div>
        </div>

        <!-- 수면장애 (중, 추후수정) -->
        <div class="record-card">
          <div class="record-info">
            <img src="assets/icons/symptom_sleep_inactive.svg" alt="수면장애" class="symptom-icon">
            <span class="symptom-name">수면장애</span>
          </div>
          <div class="record-badge mid">중</div>
        </div>

        <!-- 피로감 (약, 추후수정) -->
        <div class="record-card">
          <div class="record-info">
            <img src="assets/icons/symptom_fatigue_inactive.svg" alt="피로감" class="symptom-icon">
            <span class="symptom-name">피로감</span>
          </div>
          <div class="record-badge low">약</div>
        </div>
      </div>

      <!-- 버튼 묶음 -->
      <div class="button-group">
        <!-- 홈으로 (하얀 버튼) -->
        <a href="index.html" class="btn btn-secondary">홈으로</a>
  
        <!-- 수정 완료 (초록 버튼) -->
        <button type="button" id="btn-edit-complete" class="btn btn-primary">수정 완료</button>
      </div>

      <!-- ========================================== -->

      <!-- 토스트 메시지 컨테이너 -->
      <div id="toast-container" class="toast-container">
  
        <!-- 성공 토스트 메시지 (초록색) -->
        <div id="toast-success" class="toast-message toast-success">
          <img src="assets/icons/check_circle.svg" alt="성공" class="toast-icon">
          <span class="toast-text">수정이 정상적으로 완료되었어요.</span>
        </div>

        <!-- 실패/에러 토스트 메시지 (빨간색) -->
        <div id="toast-error" class="toast-message toast-error">
          <img src="assets/icons/check_circle_error.svg" alt="실패" class="toast-icon">
          <span class="toast-text">기록을 수정하지 못했습니다.<br>다시 한번 시도해 주세요.</span>
        </div>
      </div>

    </main>

  </div>

  <script src="js/tracker.js"></script>
  <script src="js/toast.js"></script>
</body>
</html>
