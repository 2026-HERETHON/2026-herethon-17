<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/mypage_detail.css">
  </head>
<body>
  
  <div class="app-container">
    
   <header class="app-header">
      <!-- 뒤로 가기 -->
      <button class="icon-btn back-btn" onclick="window.history.back()">
        <img src="assets/icons/back.svg" alt="뒤로가기"/>
      </button>

      <!-- 페이지 타이틀 -->
      <h1 class="header-title">프로필/계정 설정</h1>
    </header>
    
    <main class="app-content">
      
      <!-- 상단 프로필 박스 -->
      <div class="profile-card">
        <!-- 단계별 로고 (JS에서 동적으로 변경) -->
        <img src="assets/icons/profile_leaf.svg" alt="프로필 로고" id="profile-logo" class="profile-logo">
        
        <!-- 유저 정보 (JS에서 동적으로 변경) -->
        <h2 id="profile-name" class="profile-name">이름</h2>
        <p id="profile-email" class="profile-email">email@domain.com</p>
        
        <!-- 현재 단계 뱃지 (JS에서 동적으로 변경) -->
        <div class="profile-stage-badge">
          <span id="profile-stage-text">현재 단계: 로딩중</span>
        </div>
      </div>

        <!-- 계정 정보 수정 폼 -->
      <form id="edit-form" class="profile-edit-form">
        
        <!-- 이름 -->
        <div class="input-group">
          <label class="input-label">이름</label>
          <div class="input-box">
            <!-- value에 현재 이름 넣어두기 -->
            <input type="text" class="input-field" value="박수현" />
            <button type="button" class="btn-edit">수정하기</button>
          </div>
        </div>

        <!-- 이메일 (수정 불가) -->
        <div class="input-group">
          <label class="input-label">이메일</label>
          <div class="input-box">
            <!-- readonly 속성으로 수정을 막음 -->
            <input type="email" class="input-field readonly-field" value="id@email.com" readonly />
          </div>
        </div>

        <!-- 비밀번호 -->
        <div class="input-group">
          <label class="input-label">비밀번호</label>
          <div class="input-box">
            <input type="password" class="input-field" value="12345678" />
            <button type="button" class="btn-edit">변경하기</button>
          </div>
        </div>

      </form>

    </main>

    <!-- 토스트 메시지 컨테이너 -->
    <div id="toast-container" class="toast-container">
      <div id="toast-success" class="toast-message toast-success">
        <img src="assets/icons/check_circle.svg" alt="성공" class="toast-icon">
        <span class="toast-text">수정이 정상적으로 완료되었어요.</span>
      </div>
      <div id="toast-error" class="toast-message toast-error">
        <img src="assets/icons/check_circle_error.svg" alt="실패" class="toast-icon">
        <span class="toast-text">기록을 수정하지 못했습니다.<br>다시 한번 시도해 주세요.</span>
      </div>
    </div>

    <!-- 하단 GNB바 -->
    <nav class="app-bottom-tab">
    
      <!-- 홈 -->
      <a href="index.html" class="tab-item">
      <img src="assets/icons/tab_home_inactive.svg" alt="홈" class="tab-icon"/>
      <span class="tab-text">홈</span>
      </a>
    
      <!-- 패턴 리포트 -->
      <a href="report.html" class="tab-item">
      <img src="assets/icons/tab_report_inactive.svg" alt="리포트" class="tab-icon"/>
      <span class="tab-text">리포트</span>
      </a>
    
      <!-- 나의 정원 -->
      <a href="garden_list.html" class="tab-item">
      <img src="assets/icons/tab_garden_inactive.svg" alt="나의 정원" class="tab-icon"/>
      <span class="tab-text">나의 정원</span>
      </a>
    
      <!-- 허브 커뮤니티 -->
      <a href="community_list.html" class="tab-item">
      <img src="assets/icons/tab_community_inactive.svg" alt="커뮤니티" class="tab-icon"/>
      <span class="tab-text">커뮤니티</span>
      </a>
    </nav>

  </div>

  

  <script src="js/common.js"></script>
  <script src="js/mypage_detail.js"></script>
</body>
</html>
