<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알림 설정</title>
</head>
<body>
    <h1>알림 설정</h1>

    <form method="post">
        {% csrf_token %}

        <label>
            <input type="checkbox" name="daily_notification"
                   {% if user.daily_notification %}
                   checked
                   {% endif %}>
            오늘 기록 알림
        </label><br>

        <label>
            <input type="checkbox" name="comment_notification"
                   {% if user.comment_notification %}
                   checked
                   {% endif %}>
            커뮤니티 댓글 알림
        </label><br>

        <label>
            <input type="checkbox" name="like_notification"
                   {% if user.like_notification %}
                   checked {% endif %}>
            커뮤니티 좋아요 알림
        </label><br>

        <label>
            기록 리마인더 시간:
            <input type="time" name="reminder_time"
                   value="{{ user.reminder_time|time:'H:i' }}">
        </label><br>

        <button type="submit">저장</button>
    </form>

    <br>
    <a href="{% url 'accounts:mypage' %}">마이페이지로 돌아가기</a>
</body>
</html>
