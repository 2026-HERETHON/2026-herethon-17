<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/mypage_detail.css">
  </head>
<body>
  
  <div class="app-container">
    <header class="app-header">
      <!-- 뒤로 가기 -->
      <button class="icon-btn back-btn">
        <img src="assets/icons/back.svg" alt="뒤로가기"/>
      </button>

      <!-- 페이지 타이틀 -->
      <h1 class="header-title">알림 설정</h1>
    </header>

    <main class="app-content">
        <div class="alarm-list">
        
        <!-- 오늘 기록 알림 -->
        <div class="alarm-card">
          <div class="alarm-text-wrapper">
            <h3 class="alarm-card-title">오늘 기록 알림</h3>
            <p class="alarm-card-desc">매일 저녁 기록을 잊지 않도록 알려드려요</p>
          </div>
          <!-- 알림 토글 (켜져있음) -->
          <label class="alarm-toggle">
            <input type="checkbox" checked/>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- 커뮤니티 댓글 -->
        <div class="alarm-card">
          <div class="alarm-text-wrapper">
            <h3 class="alarm-card-title">커뮤니티 댓글</h3>
            <p class="alarm-card-desc">내 게시글에 댓글이 달리면 알려드려요</p>
          </div>
          <!-- 알림 토글 (켜져있음) -->
          <label class="alarm-toggle">
            <input type="checkbox" checked/>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- 커뮤니티 좋아요 -->
        <div class="alarm-card">
          <div class="alarm-text-wrapper">
            <h3 class="alarm-card-title">커뮤니티 좋아요</h3>
            <p class="alarm-card-desc">내 게시글에 좋아요가 달리면 알려드려요</p>
          </div>
          <!-- 알림 토글 (꺼져있음) -->
          <label class="alarm-toggle">
            <input type="checkbox"/>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- 기록 리마인더 시간 -->
        <div class="alarm-card is-time-card">
          <h3 class="time-card-title">기록 리마인더 시간</h3>
          
          <div class="time-setting-wrapper">
            <div class="time-box">
              <span class="time-text" id="time-text">오후 8:00</span>
              <!-- 10분 단위로 설정된 네이티브 타임 피커 -->
              <input type="time" id="time-input" value="20:00" step="600">
            </div>
            <!-- 버튼 클릭 시 time-input을 실행 -->
            <label class="btn-change" for="time-input">변경</label>
          </div>
        </div>

      </div>
    </main>

    <!-- 하단 GNB바 -->
    <nav class="app-bottom-tab">
    
      <!-- 홈 -->
      <a href="index.html" class="tab-item">
      <img src="assets/icons/tab_home_inactive.svg" alt="홈" class="tab-icon"/>
      <span class="tab-text">홈</span>
      </a>
    
      <!-- 패턴 리포트 -->
      <a href="report.html" class="tab-item">
      <img src="assets/icons/tab_report_inactive.svg" alt="리포트" class="tab-icon"/>
      <span class="tab-text">리포트</span>
      </a>
    
      <!-- 나의 정원 -->
      <a href="garden_list.html" class="tab-item">
      <img src="assets/icons/tab_garden_inactive.svg" alt="나의 정원" class="tab-icon"/>
      <span class="tab-text">나의 정원</span>
      </a>
    
      <!-- 허브 커뮤니티 -->
      <a href="community_list.html" class="tab-item">
      <img src="assets/icons/tab_community_inactive.svg" alt="커뮤니티" class="tab-icon"/>
      <span class="tab-text">커뮤니티</span>
      </a>
    </nav>

  </div>

  <script src="js/common.js"></script>
  <script src="js/mypage_detail.js"></script>
</body>
</html>
