<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>저장 완료</title>
</head>
<body>
    <h1>저장 완료</h1>
    <p>{{ date }}</p>

    {% if daily_record.no_symptom %}
        <p>증상 없음</p>

    {% else %}
        {% for entry in daily_record.entries.all %}
            <p>{{ entry.symptom.name }}: {{ entry.intensity }}</p>
        {% endfor %}
    {% endif %}

    <a href="#">패턴 리포트 보기</a><br>
    <a href="#">홈으로</a>
</body>
</html>
