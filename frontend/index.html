<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  
  <div class="app-container">
    
    <main class="app-content">

      <div class="home-header">
        <div class="home-logo">
          <img src="assets/icons/home_herb_icon.png" alt="HERb 로고">
          <span class="home-logotext">HERb</span>
        </div>
      </div>

      <div class="welcome-banner" id="welcome-banner" style="display: none;">
        <button class="welcome-close" id="welcome-close">x</button>
        <p class="welcome-text">
          🌿 오랜만이에요, <span id="welcome-username">수현</span>님!<br>
          <span class="welcome-days"><span id="welcome-days">8</span>일 만에 만났어요. 그동안 잘 지내셨나요?</span><br>
          다시 함께 시작해봐요 🌱
        </p>
      </div>

      <div class="home-greeting">
        <div class="home-greeting-top">
          <p class="home-date" id="home-date">2026년 6월 27일 토요일</p>
          <div class="home-headericons">
            <button class="home-iconbtn" id="home-noti">
              <img src="assets/icons/NotiIcon.png" alt="알림">
            </button>
            <button class="home-iconbtn home-iconbtn-profile" id="home-profile">
              <img src="assets/icons/ProfileIcon.png" alt="프로필">
            </button>
          </div>
        </div>

        <h1 class="home-username">안녕하세요, <span id="username">수현</span>님 👋</h1>
      </div>

      <div class="summary-card">
        <p class="summary-label">오늘의 요약</p>
        <h2 class="summary-stage">지금 나는 <span class="summary-stage1" id="stage-name">혼란기</span></h2>

        <div class="summary-week">
          <p class="summary-weeklabel">이번 주 기록</p>
          <div class="summary-days" id="summary-days">
          </div>
        </div>

        <button class="summary-btn" id="record-btn">오늘 증상 기록하기</button>
      </div>

      <p class="home-menutitle">오늘은 무엇을 할까요?</p>
      <div class="home-menugrid">
        <a href="tracker.html" class="menu-card">
          <div class="menu-iconwrap menu-icon-tracker">
            <img src="assets/icons/TrackerIcon.png" alt="">
          </div>
          <p class="menu-title">증상 트래커</p>
          <p class="menu-subtitle">오늘 기록하기</p>
        </a>

        <a href="report.html" class="menu-card">
          <div class="menu-iconwrap menu-icon-report">
            <img src="assets/icons/PatternReportIcon.png" alt="">
          </div>
          <p class="menu-title">패턴 리포트</p>
          <p class="menu-subtitle">주간/월간 분석</p>
        </a>

        <a href="garden_list.html" class="menu-card">
          <div class="menu-iconwrap menu-icon-garden">
            <img src="assets/icons/MyGardenIcon.png" alt="">
          </div>
          <p class="menu-title">나의 정원</p>
          <p class="menu-subtitle">새 도전 기록하기</p>
        </a>

        <a href="community_list.html" class="menu-card">
          <div class="menu-iconwrap menu-icon-community">
            <img src="assets/icons/CommunityIcon.png" alt="">
          </div>
          <p class="menu-title">허브 커뮤니티</p>
          <p class="menu-subtitle">경험 나누기</p>
        </a>
      </div>

    </main>

    <nav class="app-bottom-tab">
      <a href="index.html" class="tab-item active">
        <img src="assets/icons/tab_home_active.svg" alt="" class="tab-icon">
        <span class="tab-text">홈</span>
      </a>
      <a href="report.html" class="tab-item">
        <img src="assets/icons/tab_report_inactive.svg" alt="" class="tab-icon">
        <span class="tab-text">리포트</span>
      </a>
      <a href="garden_list.html" class="tab-item">
        <img src="assets/icons/tab_garden_inactive.svg" alt="" class="tab-icon">
        <span class="tab-text">나의 정원</span>
      </a>
      <a href="community_list.html" class="tab-item">
        <img src="assets/icons/tab_community_inactive.svg" alt="" class="tab-icon">
        <span class="tab-text">커뮤니티</span>
      </a>
    </nav>

  </div>

  <script src="js/common.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
