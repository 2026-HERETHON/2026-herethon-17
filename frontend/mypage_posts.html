<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/mypage_detail.css">
</head>
<body>
  
  <div class="app-container">

    <header class="app-header">
      <!-- 뒤로 가기 -->
      <button class="icon-btn back-btn">
        <img src="assets/icons/back.svg" alt="뒤로가기"/>
      </button>

      <!-- 페이지 타이틀 -->
      <h1 class="header-title">내가 쓴 글</h1>
    </header>
    
    <main class="app-content">
        <div class="post-list">
        <!-- 게시글 카드 (반복되는 아이템) -->
        <!-- 서버에서 넘어온 posts 데이터를 반복 -->
        {% for post in posts %}
        <div class="post-card" data-id="{{ post.id }}">
          
          <div class="post-card-top">
            <div class="post-tags-wrapper">
              <!-- 게시글의 태그 -->
              <span class="symptom-tag">{{ post.tag_name }}</span>
            </div>
            <!-- 작성 시간 -->
            <span class="post-time">{{ post.created_at|timesince }} 전</span>
          </div>
        
          <h3 class="post-card-title">{{ post.title }}</h3>
          <p class="post-card-content">{{ post.content|truncatechars:40 }}</p>
        
          <div class="post-card-bottom">
            <div class="post-item">
              <img src="assets/icons/icon_like.svg" alt="좋아요"/>
              <span class="count">{{ post.like_count }}</span>
            </div>
            <div class="post-item">
              <img src="assets/icons/icon_chat.svg" alt="댓글"/>
              <span class="count">{{ post.comment_count }}</span>
            </div>
          </div>
          
        </div>
        {% empty %}
        <!-- 작성한 글이 없을 때 나타나는 화면 -->
        <div style="text-align: center; padding: 40px 0; color: #9A9A9A;">
          작성한 게시글이 없습니다.
        </div>
        {% endfor %}
        <!-- 반복문 끝 -->

      </div>
    </main>

    <!-- 하단 GNB바 -->
    <nav class="app-bottom-tab">
    
      <!-- 홈 -->
      <a href="index.html" class="tab-item">
      <img src="assets/icons/tab_home_inactive.svg" alt="홈" class="tab-icon"/>
      <span class="tab-text">홈</span>
      </a>
    
      <!-- 패턴 리포트 -->
      <a href="report.html" class="tab-item">
      <img src="assets/icons/tab_report_inactive.svg" alt="리포트" class="tab-icon"/>
      <span class="tab-text">리포트</span>
      </a>
    
      <!-- 나의 정원 -->
      <a href="garden_list.html" class="tab-item">
      <img src="assets/icons/tab_garden_inactive.svg" alt="나의 정원" class="tab-icon"/>
      <span class="tab-text">나의 정원</span>
      </a>
    
      <!-- 허브 커뮤니티 -->
      <a href="community_list.html" class="tab-item">
      <img src="assets/icons/tab_community_inactive.svg" alt="커뮤니티" class="tab-icon"/>
      <span class="tab-text">커뮤니티</span>
      </a>
    </nav>

  </div>

  <script src="js/common.js"></script>
  <script src="js/mypage_detail.js"></script>
</body>
</html>
