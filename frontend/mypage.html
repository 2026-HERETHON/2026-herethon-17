<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HERb</title>

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/mypage.css">
  </head>
<body>
  
  <div class="app-container">
    <header class="app-header">
      <button class="icon-btn back-btn">
        <img src="assets/icons/back.svg" alt="뒤로가기"/>
      </button>
      <h1 class="header-title">마이페이지</h1>
    </header>

    <main class="app-content">
      <div class="mypage-container">

        <div class="mypage-profile-card">
          <img src="assets/icons/profile_leaf.svg" alt="새싹 프로필" class="mypage-avatar-img" id="profile-logo">
          <div class="mypage-user-info">
            <h2 class="mypage-username" id="profile-name">박수현</h2>
            <span class="mypage-user-email" id="profile-email">id@email.com</span>
            <span class="mypage-status-badge" id="profile-stage-text">현재 단계: 혼란기</span>
          </div>
        </div>
      
        <div class="mypage-menu-list">

          <a href="mypage_profile.html" class="mypage-menu-item">
            <div class="mypage-menu-left">
              <img src="assets/icons/icon_profile.svg" alt="프로필">
              <span class="mypage-menu-text">프로필/계정 설정</span>
            </div>
            <img src="assets/icons/arrow_right.svg" alt="이동" class="mypage-menu-arrow">
          </a>
        
          <a href="mypage_noti.html" class="mypage-menu-item">
            <div class="mypage-menu-left">
              <div class="mypage-menu-icon-wrapper bg-green-light">
                <img src="assets/icons/icon_noti.svg" alt="알림">
              </div>
              <span class="mypage-menu-text">알림 설정</span>
            </div>
            <img src="assets/icons/arrow_right.svg" alt="이동" class="mypage-menu-arrow">
          </a>
        
          <a href="survey.html" class="mypage-menu-item">
            <div class="mypage-menu-left">
              <div class="mypage-menu-icon-wrapper bg-green-light">
                <img src="assets/icons/icon_pulse.svg" alt="자가진단">
              </div>
              <span class="mypage-menu-text">자가진단 다시하기</span>
            </div>
            <img src="assets/icons/arrow_right.svg" alt="이동" class="mypage-menu-arrow">
          </a>
        
          <a href="mypage_posts.html" class="mypage-menu-item">
            <div class="mypage-menu-left">
              <div class="mypage-menu-icon-wrapper bg-green-light">
                <img src="assets/icons/icon_posts.svg" alt="내가쓴글">
              </div>
              <span class="mypage-menu-text">내가 쓴 글</span>
            </div>
            <img src="assets/icons/arrow_right.svg" alt="이동" class="mypage-menu-arrow">
          </a>
        
          <a href="#" class="mypage-menu-item logout-item" id="logoutBtn">
            <div class="mypage-menu-left">
              <div class="mypage-menu-icon-wrapper bg-red-light">
                <img src="assets/icons/icon_logout.svg" alt="로그아웃">
              </div>
              <span class="mypage-menu-text color-red">로그아웃</span>
            </div>
            <img src="assets/icons/arrow_right.svg" alt="이동" class="mypage-menu-arrow">
          </a>
        
        </div>
      </div>
    </main>

    <!-- 하단 GNB바 -->
    <nav class="app-bottom-tab">
    
      <!-- 홈 -->
      <a href="index.html" class="tab-item">
      <img src="assets/icons/tab_home_inactive.svg" alt="홈" class="tab-icon"/>
      <span class="tab-text">홈</span>
      </a>
    
      <!-- 패턴 리포트 -->
      <a href="report.html" class="tab-item">
      <img src="assets/icons/tab_report_inactive.svg" alt="리포트" class="tab-icon"/>
      <span class="tab-text">리포트</span>
      </a>
    
      <!-- 나의 정원 -->
      <a href="garden_list.html" class="tab-item">
      <img src="assets/icons/tab_garden_inactive.svg" alt="나의 정원" class="tab-icon"/>
      <span class="tab-text">나의 정원</span>
      </a>
    
      <!-- 허브 커뮤니티 -->
      <a href="community_list.html" class="tab-item">
      <img src="assets/icons/tab_community_inactive.svg" alt="커뮤니티" class="tab-icon"/>
      <span class="tab-text">커뮤니티</span>
      </a>
    </nav>

  </div>
  <div id="deleteModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-icon"><img src="assets/icons/modal_alert_active.svg" alt="느낌표"/></div>
      <h2 class="modal-title" id="modalMainTitle">안내제목</h2>
      <p class="modal-subtitle" id="modalSubTitle">안내문구</p>
      <div class="modal-btn-group">
        <button id="confirmDelete" class="modal-btn btn-delete">삭제/로그아웃</button>
        <button id="cancelDelete" class="modal-btn btn-cancel">취소</button>
      </div>
    </div>
  </div>

  <script src="js/mypage_detail.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
